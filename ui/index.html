<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoMist Settings</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f3ee;
        --panel: #ffffff;
        --text: #1f1a17;
        --muted: #6d6258;
        --accent: #c96c2b;
        --border: #e6ded6;
      }

      body {
        margin: 0;
        font-family: "Alegreya Sans", "Iowan Old Style", "Palatino", serif;
        background: var(--bg);
        color: var(--text);
      }

      .container {
        max-width: 720px;
        margin: 0 auto;
        padding: 48px 24px 64px;
      }

      header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 32px;
      }

      h1 {
        font-size: 32px;
        letter-spacing: 0.5px;
        margin: 0;
      }

      p {
        margin: 8px 0 0;
        color: var(--muted);
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(31, 26, 23, 0.08);
      }

      label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        padding: 12px 14px;
        font-size: 15px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #fffdf9;
        margin-bottom: 18px;
      }

      button {
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 999px;
        padding: 12px 22px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }

      .status {
        margin-top: 12px;
        font-size: 14px;
      }

      .status.ok {
        color: #2f7a4b;
      }

      .status.error {
        color: #a33c33;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div>
          <h1>NeoMist</h1>
          <p>Configure your Helios endpoints for Ethereum local access.</p>
        </div>
      </header>

      <div class="panel">
        <label for="consensusRpc">Consensus RPC</label>
        <input id="consensusRpc" type="text" />

        <label for="executionRpc">Execution RPC</label>
        <input id="executionRpc" type="text" />

        <button id="saveBtn">Save settings</button>
        <div id="status" class="status"></div>
      </div>
    </div>

    <script>
      const consensusInput = document.getElementById('consensusRpc');
      const executionInput = document.getElementById('executionRpc');
      const statusEl = document.getElementById('status');

      async function loadConfig() {
        const response = await fetch('/api/config');
        const data = await response.json();
        consensusInput.value = data.consensus_rpc || '';
        executionInput.value = data.execution_rpc || '';
      }

      async function saveConfig() {
        statusEl.textContent = '';
        const payload = {
          consensus_rpc: consensusInput.value,
          execution_rpc: executionInput.value,
        };

        const response = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const result = await response.json();
        if (result.success) {
          statusEl.textContent = 'Saved. Restart app to apply new endpoints.';
          statusEl.className = 'status ok';
        } else {
          statusEl.textContent = result.error || 'Failed to save settings.';
          statusEl.className = 'status error';
        }
      }

      document.getElementById('saveBtn').addEventListener('click', saveConfig);
      loadConfig().catch(() => {
        statusEl.textContent = 'Failed to load configuration.';
        statusEl.className = 'status error';
      });
    </script>
  </body>
</html>
