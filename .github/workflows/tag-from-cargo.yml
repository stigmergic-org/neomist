name: Tag From Cargo

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    name: Create Version Tag
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read Cargo version
        id: cargo_version
        run: |
          version="$(awk -F '"' '/^version = "/ { print $2; exit }' Cargo.toml)"
          if [[ -z "$version" ]]; then
            echo "Failed to read version from Cargo.toml" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Fail if tag exists remotely
        env:
          TAG: ${{ steps.cargo_version.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin" >&2
            exit 1
          fi

      - name: Create and push annotated tag
        env:
          TAG: ${{ steps.cargo_version.outputs.tag }}
        run: |
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' tag -a "$TAG" -m "Release $TAG"
          git push origin "refs/tags/$TAG"
