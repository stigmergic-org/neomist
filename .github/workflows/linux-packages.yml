name: Linux Packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  prepare:
    name: Read Version
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.cargo_version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read Cargo version
        id: cargo_version
        run: |
          version="$(awk -F '"' '/^version = "/ { print $2; exit }' Cargo.toml)"
          if [[ -z "$version" ]]; then
            echo "Failed to read version from Cargo.toml" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  deb:
    name: Debian Package (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    needs: prepare

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64
            runner: ubuntu-24.04
            artifact_arch: x86_64
          - name: arm64
            runner: ubuntu-24.04-arm
            artifact_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev libglib2.0-dev libgtk-3-dev libayatana-appindicator3-dev appstream desktop-file-utils

      - name: Build Debian package
        run: scripts/build-deb.sh

      - name: Upload Debian artifact
        uses: actions/upload-artifact@v7
        with:
          name: neomist-${{ needs.prepare.outputs.version }}-linux-${{ matrix.artifact_arch }}.deb
          path: dist/neomist-${{ needs.prepare.outputs.version }}-linux-${{ matrix.artifact_arch }}.deb
          if-no-files-found: error

  appimage:
    name: AppImage (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    needs: prepare

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64
            runner: ubuntu-24.04
            artifact_arch: x86_64
          - name: aarch64
            runner: ubuntu-24.04-arm
            artifact_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libayatana-appindicator3-dev patchelf appstream desktop-file-utils

      - name: Build AppImage
        run: scripts/build-appimage.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          name: neomist-${{ needs.prepare.outputs.version }}-linux-${{ matrix.artifact_arch }}.AppImage
          path: dist/neomist-${{ needs.prepare.outputs.version }}-linux-${{ matrix.artifact_arch }}.AppImage
          if-no-files-found: error

  arch:
    name: Arch Package (x86_64)
    runs-on: ubuntu-24.04
    needs: prepare
    container:
      image: archlinux:base-devel

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            ca-certificates-utils \
            cargo \
            cmake \
            git \
            glib2 \
            gtk3 \
            libayatana-appindicator \
            libcap \
            namcap \
            nodejs \
            npm \
            openssl \
            pkgconf \
            polkit \
            rust \
            sudo \
            systemd \
            xdg-utils

      - name: Prepare makepkg user
        run: |
          useradd -m builder
          printf 'builder ALL=(ALL) NOPASSWD: ALL\n' > /etc/sudoers.d/builder
          chmod 0440 /etc/sudoers.d/builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Validate PKGBUILD
        run: sudo -u builder env GITHUB_WORKSPACE="$GITHUB_WORKSPACE" bash -lc 'cd "$GITHUB_WORKSPACE" && namcap packaging/arch/PKGBUILD || true'

      - name: Build Arch package
        run: sudo -u builder env GITHUB_WORKSPACE="$GITHUB_WORKSPACE" bash -lc 'cd "$GITHUB_WORKSPACE" && scripts/build-arch.sh --local'

      - name: Validate Arch artifact
        run: sudo -u builder env GITHUB_WORKSPACE="$GITHUB_WORKSPACE" bash -lc 'cd "$GITHUB_WORKSPACE" && namcap dist/neomist-${{ needs.prepare.outputs.version }}-linux-x86_64.pkg.tar.zst || true'

      - name: Upload Arch artifact
        uses: actions/upload-artifact@v7
        with:
          name: neomist-${{ needs.prepare.outputs.version }}-linux-x86_64.pkg.tar.zst
          path: dist/neomist-${{ needs.prepare.outputs.version }}-linux-x86_64.pkg.tar.zst
          if-no-files-found: error
